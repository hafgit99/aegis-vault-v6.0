    <circle cx="310" cy="282" r="15" fill="#65dbff" fill-opacity="0.42"/>
    <circle cx="714" cy="282" r="15" fill="#65dbff" fill-opacity="0.42"/>
    <circle cx="302" cy="744" r="13" fill="#d9a33f" fill-opacity="0.42"/>
    <circle cx="722" cy="744" r="13" fill="#d9a33f" fill-opacity="0.42"/>
  </g>

  <g filter="url(#softShadow)">
    <path d="M512 150c105 76 203 104 302 104 1 231-92 433-302 560-210-127-303-329-302-560 99 0 197-28 302-104Z" fill="#06111a"/>
    <path d="M512 184c92 64 179 90 266 95-8 205-88 368-266 477-178-109-258-272-266-477 87-5 174-31 266-95Z" fill="url(#shieldEdge)"/>
    <path d="M512 218c79 51 151 76 225 84-14 175-82 312-225 405-143-93-211-230-225-405 74-8 146-33 225-84Z" fill="url(#shield)" filter="url(#innerGlow)"/>
  </g>

  <path d="M512 274c59 36 114 55 169 62-16 137-68 241-169 313-101-72-153-176-169-313 55-7 110-26 169-62Z" fill="#07121b" fill-opacity="0.72"/>
  <path d="M512 274v375c101-72 153-176 169-313-55-7-110-26-169-62Z" fill="#ffffff" fill-opacity="0.05"/>

  <g filter="url(#softShadow)">
    <rect x="363" y="445" width="298" height="236" rx="58" fill="#061018"/>
