  <path d="M418 512h188M418 612h188" fill="none" stroke="#fff3c4" stroke-opacity="0.42" stroke-width="8" stroke-linecap="round"/>
  <path d="M322 326c-15 114 19 246 93 335" fill="none" stroke="#ffffff" stroke-opacity="0.18" stroke-width="18" stroke-linecap="round"/>
  <path d="M356 284c50-13 101-34 156-66 69 41 133 64 194 72" fill="none" stroke="#ffffff" stroke-opacity="0.24" stroke-width="14" stroke-linecap="round"/>
</svg>
