<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">AegisVault application icon</title>
  <desc id="desc">A dark rounded-square vault shield mark with cyan and gold security accents.</desc>
  <defs>
    <linearGradient id="bg" x1="120" y1="80" x2="904" y2="944" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#172132"/>
      <stop offset="0.48" stop-color="#0a0f18"/>
      <stop offset="1" stop-color="#030507"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="30%" r="58%">
      <stop offset="0" stop-color="#48d4ff" stop-opacity="0.24"/>
      <stop offset="0.52" stop-color="#48d4ff" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#48d4ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="shield" x1="284" y1="182" x2="740" y2="824" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#effaff"/>
      <stop offset="0.2" stop-color="#99e7ff"/>
      <stop offset="0.56" stop-color="#1382aa"/>
      <stop offset="1" stop-color="#08364a"/>
    </linearGradient>
    <linearGradient id="shieldEdge" x1="294" y1="170" x2="730" y2="830" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.34" stop-color="#6ee7ff"/>
      <stop offset="1" stop-color="#0b2231"/>
    </linearGradient>
    <linearGradient id="gold" x1="388" y1="360" x2="656" y2="668" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffe7a3"/>
      <stop offset="0.5" stop-color="#d99c3b"/>
      <stop offset="1" stop-color="#85551b"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="34" stdDeviation="34" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <filter id="innerGlow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8" result="blur"/>
      <feOffset dy="2"/>
      <feComposite in2="SourceAlpha" operator="arithmetic" k2="-1" k3="1" result="inner"/>
      <feColorMatrix in="inner" type="matrix" values="0 0 0 0 0.33 0 0 0 0 0.94 0 0 0 0 1 0 0 0 0.85 0"/>
      <feComposite in2="SourceGraphic" operator="over"/>
    </filter>
    <clipPath id="roundClip">
      <rect x="64" y="64" width="896" height="896" rx="210"/>
    </clipPath>
  </defs>

  <rect width="1024" height="1024" rx="232" fill="url(#bg)"/>
  <g clip-path="url(#roundClip)">
    <circle cx="512" cy="310" r="520" fill="url(#halo)"/>
    <path d="M92 282h196M736 282h196M124 744h236M664 744h236" fill="none" stroke="#66d9ff" stroke-opacity="0.12" stroke-width="16" stroke-linecap="round"/>
