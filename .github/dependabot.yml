version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
      timezone: Europe/Istanbul
    open-pull-requests-limit: 5
    groups:
      npm-production:
        dependency-type: production
      npm-development:
        dependency-type: development

  - package-ecosystem: cargo
    directory: /src-tauri
    schedule:
      interval: weekly
      day: monday
      time: "04:30"
      timezone: Europe/Istanbul
    open-pull-requests-limit: 5
    ignore:
      # The `windows` crate is target-specific and used only by the Windows
      # sensitive clipboard bridge. Keep it on manual review so Dependabot does
      # not publish broken updater runs when the Win32 binding graph changes.
      - dependency-name: windows

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
      timezone: Europe/Istanbul
    open-pull-requests-limit: 5
