name: Release Preflight

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: release-preflight-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preflight:
    name: Validate release candidate
    runs-on: ubuntu-latest
    env:
      CI: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify release version
        run: npm run release:verify-version -- ${{ github.ref_name }}

      - name: Full dependency audit
        run: npm run audit:all

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox

      - name: Lint
        run: npm run lint

      - name: Security regression scan
        run: npm run security:scan

      - name: Generate security evidence bundle
        run: npm run security:evidence

      - name: Upload security evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: security-evidence
          path: security-evidence/
          retention-days: 30

      - name: Unit coverage
        run: npm run test:coverage

      - name: Build web assets
        run: npm run build

      - name: Build budget
        run: npm run build:budget

      - name: Release E2E gate
        run: npm run test:e2e:release

      - name: Upload web build
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: web-dist
          path: dist/
          retention-days: 30

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
