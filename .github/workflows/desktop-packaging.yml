name: Desktop Packaging

on:
  workflow_dispatch:
    inputs:
      signing:
        description: Signing mode for desktop artifacts
        required: true
        default: unsigned
        type: choice
        options:
          - unsigned
          - windows
          - macos
          - all
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write
  attestations: write
  artifact-metadata: write

concurrency:
  group: desktop-packaging-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preflight:
    name: Release gate
    runs-on: ubuntu-latest
    env:
      CI: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate platform SBOM
        run: npm run security:sbom

      - name: Verify release version
        if: startsWith(github.ref, 'refs/tags/')
        run: npm run release:verify-version -- ${{ github.ref_name }}

      - name: Full dependency audit
        run: npm run audit:all

      - name: Workflow permission audit
        run: npm run security:workflows

      - name: Dependency policy audit
        run: npm run security:dependencies

      - name: Validation rules audit
        run: npm run security:validation

      - name: Privacy notice audit
        run: npm run security:privacy

      - name: Release signing policy audit
        run: npm run security:signing

      - name: Branch protection policy audit
        run: npm run security:branch-protection

      - name: Desktop smoke policy audit
        run: npm run security:desktop-smoke

      - name: Desktop Autofill extension gate
        run: npm run desktop:autofill:doctor

      - name: Security logging policy audit
        run: npm run security:logging

      - name: Error taxonomy audit
        run: npm run security:errors

      - name: Release notes template audit
        run: npm run security:release-notes

      - name: Vulnerability disclosure policy audit
        run: npm run security:disclosure

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox

      - name: Lint
        run: npm run lint

      - name: Security regression scan
        run: npm run security:scan

      - name: Generate SBOM
        run: npm run security:sbom

      - name: Upload SBOM
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom/
          retention-days: 30

      - name: Generate security evidence bundle
        run: npm run security:evidence

      - name: Upload security evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-evidence
          path: security-evidence/
          retention-days: 30

      - name: Unit coverage
        run: npm run test:coverage -- --retry=1

      - name: Build web assets
        run: npm run build

      - name: Build budget
        run: npm run build:budget

      - name: Release E2E gate
        run: npm run test:e2e:release

  package:
    name: Build desktop artifacts
    needs: preflight
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            artifact-name: aegisvault-macos
            rust-targets: "aarch64-apple-darwin,x86_64-apple-darwin"
            bundle-path: src-tauri/target/universal-apple-darwin/release/bundle
          - platform: ubuntu-24.04
            artifact-name: aegisvault-linux
            rust-targets: ""
            bundle-path: src-tauri/target/release/bundle
          - platform: windows-latest
            artifact-name: aegisvault-windows
            rust-targets: ""
            bundle-path: src-tauri/target/release/bundle
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 45
    env:
      CI: true
      SIGNING_MODE: ${{ github.event.inputs.signing || 'unsigned' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-24.04'
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: npm ci

      - name: Stage desktop Autofill browser extension
        if: runner.os == 'Windows'
        run: npm run desktop:autofill:extension:stage

      - name: Generate platform SBOM
        run: npm run security:sbom

      - name: Verify release version
        if: startsWith(github.ref, 'refs/tags/')
        run: npm run release:verify-version -- ${{ github.ref_name }}

      - name: Validate Windows signing secrets
        if: matrix.platform == 'windows-latest' && (env.SIGNING_MODE == 'windows' || env.SIGNING_MODE == 'all')
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          if (-not $env:WINDOWS_CERTIFICATE -or -not $env:WINDOWS_CERTIFICATE_PASSWORD) {
            throw "Windows signing requested, but WINDOWS_CERTIFICATE or WINDOWS_CERTIFICATE_PASSWORD is missing."
          }

      - name: Validate macOS signing secrets
        if: runner.os == 'macOS' && (env.SIGNING_MODE == 'macos' || env.SIGNING_MODE == 'all')
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          missing=0
          for name in APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_SIGNING_IDENTITY APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID; do
            if [ -z "${!name}" ]; then
              echo "$name is missing"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "macOS signing requested, but one or more Apple signing/notarization secrets are missing."
            exit 1
          fi

      - name: Import macOS Developer ID certificate
        if: runner.os == 'macOS' && (env.SIGNING_MODE == 'macos' || env.SIGNING_MODE == 'all')
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/aegisvault_developer_id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/aegisvault-signing.keychain-db"
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERTIFICATE_PATH"
          security create-keychain -p "$APPLE_CERTIFICATE_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$APPLE_CERTIFICATE_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$APPLE_CERTIFICATE_PASSWORD" "$KEYCHAIN_PATH"

      - name: Build desktop package (macOS universal signed)
        if: runner.os == 'macOS' && (env.SIGNING_MODE == 'macos' || env.SIGNING_MODE == 'all')
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run desktop:build -- --target universal-apple-darwin

      - name: Build desktop package (macOS universal unsigned)
        if: runner.os == 'macOS' && env.SIGNING_MODE != 'macos' && env.SIGNING_MODE != 'all'
        run: npm run desktop:build -- --target universal-apple-darwin

      - name: Build desktop package (Windows signed)
        if: runner.os == 'Windows' && (env.SIGNING_MODE == 'windows' || env.SIGNING_MODE == 'all')
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: npm run desktop:build

      - name: Sign Windows desktop artifacts with Authenticode
        if: runner.os == 'Windows' && (env.SIGNING_MODE == 'windows' || env.SIGNING_MODE == 'all')
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          $certPath = Join-Path $env:RUNNER_TEMP "aegisvault-authenticode.pfx"
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE))
          $signtool = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin" -Recurse -Filter signtool.exe |
            Where-Object { $_.FullName -match "\\x64\\signtool.exe$" } |
            Select-Object -First 1
          if (-not $signtool) { throw "signtool.exe was not found on the Windows runner." }
          $artifacts = Get-ChildItem "src-tauri/target/release/bundle" -Recurse -Include *.exe,*.msi
          if (-not $artifacts) { throw "No Windows executable artifacts found for Authenticode signing." }
          foreach ($artifact in $artifacts) {
            & $signtool.FullName sign /f $certPath /p $env:WINDOWS_CERTIFICATE_PASSWORD /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 $artifact.FullName
            & $signtool.FullName verify /pa /v $artifact.FullName
          }

      - name: Build desktop package (Windows/Linux unsigned)
        if: (runner.os == 'Windows' && env.SIGNING_MODE != 'windows' && env.SIGNING_MODE != 'all') || runner.os == 'Linux'
        run: npm run desktop:build

      - name: Build desktop Autofill native host
        if: runner.os == 'Windows'
        run: npm run desktop:autofill:host:build

      - name: Stage desktop Autofill native host
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          AEGISVAULT_CHROMIUM_EXTENSION_ID: ${{ vars.AEGISVAULT_CHROMIUM_EXTENSION_ID || 'fbegblomolojcldifclfljlkddkcdehl' }}
        run: npm run desktop:autofill:host:stage

      - name: Notarize macOS desktop artifacts
        if: runner.os == 'macOS' && (env.SIGNING_MODE == 'macos' || env.SIGNING_MODE == 'all')
        shell: bash
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          shopt -s nullglob
          artifacts=(src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg)
          if [ "${#artifacts[@]}" -eq 0 ]; then
            echo "No macOS DMG artifact found for notarization."
            exit 1
          fi
          for artifact in "${artifacts[@]}"; do
            xcrun notarytool submit "$artifact" --apple-id "$APPLE_ID" --password "$APPLE_PASSWORD" --team-id "$APPLE_TEAM_ID" --wait
            xcrun stapler staple "$artifact"
          done

      - name: Generate artifact checksums
        run: npm run desktop:checksums -- ${{ matrix.bundle-path }}

      - name: Stage desktop release artifacts
        run: node scripts/stage-desktop-artifacts.mjs ${{ matrix.bundle-path }} desktop-artifacts/${{ matrix.artifact-name }}

      - name: Upload desktop Autofill native host
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: aegisvault-desktop-autofill-host
          path: desktop-autofill-host/
          retention-days: 30

      - name: Upload desktop Autofill browser extension
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: aegisvault-desktop-autofill-extension
          path: desktop-autofill-extension/
          retention-days: 30

      - name: Attest desktop artifact provenance
        continue-on-error: true
        uses: actions/attest@v4
        with:
          subject-path: desktop-artifacts/${{ matrix.artifact-name }}/*

      - name: Attest desktop SBOM
        continue-on-error: true
        uses: actions/attest@v4
        with:
          subject-path: desktop-artifacts/${{ matrix.artifact-name }}/*
          sbom-path: sbom/aegisvault.cdx.json

      - name: Upload desktop SBOM
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}-sbom
          path: sbom/
          retention-days: 30

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: desktop-artifacts/${{ matrix.artifact-name }}/
          retention-days: 30
