name: Scheduled Quality

on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * 1'

permissions:
  contents: read

concurrency:
  group: scheduled-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Weekly security and release gate
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      CI: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Full dependency audit
        run: npm run audit:all

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox

      - name: Coverage threshold gate
        run: npm run test:coverage

      - name: Build web assets
        run: npm run build

      - name: Build budget gate
        run: npm run build:budget

      - name: Release E2E gate
        run: npm run test:e2e:release

      - name: Upload web build
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scheduled-web-dist
          path: dist/
          retention-days: 14

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scheduled-coverage-report
          path: coverage/
          retention-days: 14

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scheduled-playwright-report
          path: playwright-report/
          retention-days: 14
