name: Scheduled Quality

on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * 1'

permissions:
  contents: read

concurrency:
  group: scheduled-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Weekly security and release gate
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      CI: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Full dependency audit
        run: npm run audit:all

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox

      - name: Verify desktop smoke evidence policy
        run: npm run security:desktop-smoke

      - name: Full weekly test:all quality gate
        run: npm run test:all

      - name: Upload web build
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scheduled-web-dist
          path: dist/
          retention-days: 14

      - name: Upload SBOM
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scheduled-sbom
          path: sbom/
          retention-days: 14

      - name: Upload security evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scheduled-security-evidence
          path: security-evidence/
          retention-days: 14

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scheduled-coverage-report
          path: coverage/
          retention-days: 14

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scheduled-playwright-report
          path: playwright-report/
          retention-days: 14
