name: Quality Gate

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

concurrency:
  group: quality-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint, unit coverage, build, and e2e
    runs-on: ubuntu-latest
    env:
      CI: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Production dependency audit
        run: npm run audit:prod

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox

      - name: Lint
        run: npm run lint

      - name: Security regression scan
        run: npm run security:scan

      - name: Generate security evidence bundle
        run: npm run security:evidence

      - name: Upload security evidence
        uses: actions/upload-artifact@v7
        with:
          name: security-evidence
          path: security-evidence/
          retention-days: 14

      - name: Unit coverage
        run: npm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

      - name: Build
        run: npm run build

      - name: Build budget
        run: npm run build:budget

      - name: Upload web build
        uses: actions/upload-artifact@v7
        with:
          name: web-dist
          path: dist/
          retention-days: 14

      - name: Full authenticated E2E gate
        run: npm run test:e2e:chromium

      - name: Firefox compatibility E2E gate
        run: npm run test:e2e:firefox:smoke

      - name: Mobile Firefox compatibility E2E gate
        run: npm run test:e2e:mobile-firefox:smoke

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
