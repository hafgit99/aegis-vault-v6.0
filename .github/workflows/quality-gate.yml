name: Quality Gate

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

concurrency:
  group: quality-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint, unit coverage, build, and e2e
    runs-on: ubuntu-latest
    env:
      CI: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Dependency review
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

      - name: Production dependency audit
        run: npm run audit:prod

      - name: Workflow permission audit
        run: npm run security:workflows

      - name: Dependency policy audit
        run: npm run security:dependencies

      - name: Validation rules audit
        run: npm run security:validation

      - name: Privacy notice audit
        run: npm run security:privacy

      - name: Release signing policy audit
        run: npm run security:signing

      - name: Branch protection policy audit
        run: npm run security:branch-protection

      - name: Desktop smoke policy audit
        run: npm run security:desktop-smoke

      - name: Security logging policy audit
        run: npm run security:logging

      - name: Error taxonomy audit
        run: npm run security:errors

      - name: Release notes template audit
        run: npm run security:release-notes

      - name: Vulnerability disclosure policy audit
        run: npm run security:disclosure

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox

      - name: Lint
        run: npm run lint

      - name: Security regression scan
        run: npm run security:scan

      - name: Android readiness gate
        run: npm run android:doctor

      - name: Desktop Autofill extension gate
        run: npm run desktop:autofill:doctor

      - name: Android Autofill regression gate
        run: npm run test:unit -- test/unit/autofill-handoff-controller.test.tsx test/unit/autofill-handoff.test.tsx test/unit/autofill-native-bridge.test.ts test/unit/autofill-provider.test.ts test/unit/autofill-matcher.test.ts

      - name: Generate SBOM
        run: npm run security:sbom

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom/
          retention-days: 14

      - name: Generate security evidence bundle
        run: npm run security:evidence

      - name: Upload security evidence
        uses: actions/upload-artifact@v4
        with:
          name: security-evidence
          path: security-evidence/
          retention-days: 14

      - name: Unit coverage
        run: npm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

      - name: Build
        run: npm run build

      - name: Build budget
        run: npm run build:budget

      - name: Upload web build
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist/
          retention-days: 14

      - name: Full authenticated E2E gate
        run: npm run test:e2e:chromium

      - name: Firefox compatibility E2E gate
        run: npm run test:e2e:firefox:smoke

      - name: Mobile Firefox compatibility E2E gate
        run: npm run test:e2e:mobile-firefox:smoke

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
