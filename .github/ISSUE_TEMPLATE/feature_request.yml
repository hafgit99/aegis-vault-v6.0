name: Feature request
description: Suggest a focused AegisVault improvement
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should AegisVault do?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Vault
        - Backup and import
        - Settings
        - Security audit
        - Desktop packaging
        - Testing and CI
        - Localization
    validations:
      required: true
